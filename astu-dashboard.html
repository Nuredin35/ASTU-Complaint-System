<!DOCTYPE html>
<html lang="en">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

        body { background-color: #f4f6f9; }

        .app-sidebar {
            background: #0f172a;
            color: #fff;
            padding: 20px 16px;
        }

        @media (min-width: 768px) {
            .app-sidebar {
                min-height: 100vh;
                position: sticky;
                top: 0;
            }
        }

        .app-nav-link {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            transition: background-color 160ms ease, color 160ms ease;
        }

        .app-nav-link:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .app-nav-link[aria-current="page"] {
            background: rgba(37, 99, 235, 0.18);
            color: #fff;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row g-0">
        <aside class="col-12 col-md-3 col-lg-2 app-sidebar" aria-label="Sidebar">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                <i class="bi bi-building" aria-hidden="true"></i>
                <div class="fw-bold">ASTU System</div>
            </div>

            <nav aria-label="Primary navigation">
                <div class="d-grid gap-1">
                    <a class="app-nav-link" href="#" aria-current="page">
                        <i class="bi bi-speedometer2" aria-hidden="true"></i>
                        <span>Dashboard</span>
                    </a>
                    <a class="app-nav-link" href="#">
                        <i class="bi bi-plus-circle" aria-hidden="true"></i>
                        <span>Submit Complaint</span>
                    </a>
                    <a class="app-nav-link" href="#">
                        <i class="bi bi-list" aria-hidden="true"></i>
                        <span>My Complaints</span>
                    </a>
                    <a class="app-nav-link" href="#">
                        <i class="bi bi-robot" aria-hidden="true"></i>
                        <span>Chatbot</span>
                    </a>
                </div>
            </nav>
        </aside>

        <main class="col-12 col-md-9 col-lg-10" aria-label="Main content">
            <header class="border-bottom bg-white">
                <div class="d-flex justify-content-between align-items-center p-3">
                    <h1 class="h4 mb-0">Dashboard</h1>
                    <button class="btn btn-outline-danger" type="button">Logout</button>
                </div>
            </header>

            <div class="p-4">
                <section class="row g-4 mb-4" aria-label="Summary cards">
                    <div class="col-12 col-md-4">
                        <div class="card border-0 shadow-sm rounded-4 p-3">
                            <div class="text-secondary small fw-semibold">Total Complaints</div>
                            <div class="display-6 fw-bold mb-0">20</div>
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <div class="card border-0 shadow-sm rounded-4 p-3">
                            <div class="text-secondary small fw-semibold">In Progress</div>
                            <div class="display-6 fw-bold mb-0">8</div>
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <div class="card border-0 shadow-sm rounded-4 p-3">
                            <div class="text-secondary small fw-semibold">Resolved</div>
                            <div class="display-6 fw-bold mb-0">12</div>
                        </div>
                    </div>
                </section>

                <section class="card border-0 shadow-sm rounded-4" aria-label="Recent complaints">
                    <div class="p-3 border-bottom">
                        <h2 class="h5 mb-0">Recent Complaints</h2>
                    </div>

                    <div class="table-responsive" role="region" aria-label="Complaints table">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Date</th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr>
                                    <td class="fw-semibold">#1</td>
                                    <td>Internet issue</td>
                                    <td>
                                        <span class="badge rounded-pill bg-danger-subtle text-danger-emphasis border border-danger-subtle">
                                            Open
                                        </span>
                                    </td>
                                    <td>2026-02-20</td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold">#2</td>
                                    <td>Broken chair</td>
                                    <td>
                                        <span class="badge rounded-pill bg-warning-subtle text-warning-emphasis border border-warning-subtle">
                                            In Progress
                                        </span>
                                    </td>
                                    <td>2026-02-21</td>
                                </tr>
                                <tr>
                                    <td class="fw-semibold">#3</td>
                                    <td>Lab computer</td>
                                    <td>
                                        <span class="badge rounded-pill bg-success-subtle text-success-emphasis border border-success-subtle">
                                            Resolved
                                        </span>
                                    </td>
                                    <td>2026-02-22</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<!-- ==== assets/js/app.js =============================================
// Frontend-only helpers: active nav + fake actions
(function () {
  const current = document.body?.dataset?.page;
  if (current) {
    document.querySelectorAll('[data-nav]').forEach((a) => {
      if (a.getAttribute('data-nav') === current) a.setAttribute('aria-current', 'page');
      else a.removeAttribute('aria-current');
    });
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.getAttribute('data-action');
    if (action === 'logout') console.info('Logout clicked.');
    if (action === 'save') console.info('Save clicked.');
    if (action === 'submit') console.info('Submit clicked.');
  });

  // Chatbot demo
  const form = document.querySelector('[data-chat-form]');
  if (form) {
    const list = document.querySelector('[data-chat-list]');
    const input = document.querySelector('[data-chat-input]');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = (input.value || '').trim();
      if (!text) return;
      addMsg('user', text);
      input.value = '';
      setTimeout(() => addMsg('bot', 'Thanks. Please add more details (location, time, and urgency).'), 400);
    });

    function addMsg(type, text) {
      const row = document.createElement('div');
      row.className = 'd-flex my-2';
      const bubble = document.createElement('div');
      bubble.className = `chat-msg ${type}`;
      bubble.textContent = text;
      row.appendChild(bubble);
      list.appendChild(row);
      list.parentElement.scrollTop = list.parentElement.scrollHeight;
    }
  }
})();
