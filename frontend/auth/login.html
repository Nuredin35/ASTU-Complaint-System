<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login • ASTU Complaint System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/app.css" />
  </head>
  <body class="app-landing">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card app-card shadow-sm">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-3">
                <div class="app-hero">
                  <div class="app-logo-wrap mb-2">
                    <img src="../assets/img/astu-logo.png" alt="ASTU logo" />
                  </div>
                  <div class="app-title">ASTU Complaint System</div>
                </div>
              </div>

              <h1 class="h4 mb-1">Login</h1>
              <p class="text-muted small mb-4">Enter your credentials and choose role to continue (demo).</p>

              <form id="loginForm">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" id="email" class="form-control" placeholder="you@astu.edu" required />
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" id="password" class="form-control" placeholder="Password" required />
                </div>

                <div class="mb-3">
                  <label for="role" class="form-label">Role</label>
                  <select id="role" class="form-select" required>
                    <option value="" disabled selected>Select role</option>
                    <option value="student">Student</option>
                    <option value="staff">Staff</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>

                <div class="d-grid gap-2">
                  <button class="btn btn-primary" id="loginBtn" type="submit">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Login
                  </button>
                  <a class="btn btn-outline-primary" href="../index.html">Back to Home</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      console.info('login.html script loaded');
      const form = document.getElementById('loginForm');
      if (!form) console.error('Login form element not found');
      form?.addEventListener('submit', function (e) {
        e.preventDefault();
        console.info('loginForm submit handler fired');
        const roleEl = document.getElementById('role');
        const role = roleEl ? roleEl.value : null;
        console.info('Selected role:', role);
        // Simple demo redirect by role
        if (!role) return alert('Please select a role.');
        if (role === 'student') window.location.href = '../student/student-dashboard.html';
        else if (role === 'staff') window.location.href = '../staff/staff-dashboard.html';
        else if (role === 'admin') window.location.href = '../admin/admin-dashboard.html';
        else window.location.href = '../index.html';
      });
    </script>
  </body>
</html>
