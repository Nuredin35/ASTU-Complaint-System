<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register • ASTU Complaint System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/app.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-6">
          <div class="text-center mb-3">
            <a class="text-decoration-none fw-bold" href="../index.html">
              <i class="bi bi-building me-1"></i> ASTU System
            </a>
          </div>

          <div class="card app-card shadow-sm">
            <div class="card-body p-4 p-md-5">
              <h1 class="h4 mb-1">Create account</h1>

              <form onsubmit="return false;">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="fname">First name</label>
                    <input class="form-control" id="fname" type="text" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="lname">Last name</label>
                    <input class="form-control" id="lname" type="text" required />
                  </div>
                  <div class="col-12">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" type="email" placeholder="you@astu.edu.et" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="role">Role</label>
                    <select class="form-select" id="role" required>
                      <option value="" selected disabled>Select role</option>
                      <option value="student">Student</option>
                      <option value="staff">Department Staff</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="dept">Department</label>
                    <select class="form-select" id="dept" required>
                      <option value="" selected disabled>Select department</option>
                      <option value="civil-engineering">Civil Engineering</option>
                      <option value="electrical-electronics-engineering">Electrical &amp; Electronics Engineering</option>
                      <option value="computing-cse-se">Computing (CSE / SE)</option>
                      <option value="applied-sciences">Applied Sciences</option>
                      <option value="mechanical-engineering">Mechanical Engineering</option>
                      <option value="chemical-engineering">Chemical Engineering</option>
                      <option value="material-engineering">Material Engineering</option>
                      <option value="architecture">Architecture</option>
                      <option value="water-resources-engineering">Water Resources / Water Engineering</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" type="password" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="confirm">Confirm</label>
                    <input class="form-control" id="confirm" type="password" required />
                  </div>
                </div>

                <button class="btn btn-primary w-100 mt-4" id="registerBtn" type="submit">
                  <i class="bi bi-person-check me-2"></i> Register
                </button>

                <div class="d-flex justify-content-between mt-3 small">
                  <a href="./login.html">Already have account?</a>
                  <a href="../index.html">Back</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById('registerBtn').addEventListener('click', function (e) {
        const form = document.querySelector('form');
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }
        console.info('Registered (demo redirect)');
        window.location.href = './login.html';
      });
    </script>
  </body>
</html>
