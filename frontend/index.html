<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASTU Complaint System (Frontend)</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/app.css" />
  </head>
  <body>
    <div class="container pt-4 pb-5">
      <div class="text-center mb-4">
        <img
          src="./student/ASTU logo.jpg"
          alt="ASTU logo"
          class="d-block mx-auto mb-2"
          style="width: 96px; height: auto"
        />
        <div class="fw-bold fs-4">
          ASTU Smart Complaint & Issue Tracking
        </div>
      </div>

      <div class="row g-4 justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card app-card shadow-sm">
            <div class="card-body p-4 p-md-5">
              <div class="row g-3">
                <div class="col-12">
                  <div class="fw-semibold">Start here</div>
                  <div class="text-secondary small">
                    Use the login page, or jump directly to dashboards.
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <a class="btn btn-primary w-100" href="./auth/login.html">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Login
                  </a>
                </div>
                <div class="col-12 col-md-6">
                  <a class="btn btn-outline-primary w-100" href="./auth/register.html">
                    <i class="bi bi-person-plus me-2"></i> Register
                  </a>
                </div>

                <div class="col-12 mt-3">
                  <div class="fw-semibold">Quick links (dashboards)</div>
                  <div class="text-secondary small">
                    These are static pages with dummy data.
                  </div>
                </div>

                <div class="col-12 col-md-4">
                  <a class="btn btn-light border w-100" href="./student/student-dashboard.html">
                    <i class="bi bi-mortarboard me-2"></i> Student
                  </a>
                </div>
                <div class="col-12 col-md-4">
                  <a class="btn btn-light border w-100" href="./staff/staff-dashboard.html">
                    <i class="bi bi-people me-2"></i> Staff
                  </a>
                </div>
                <div class="col-12 col-md-4">
                  <a class="btn btn-light border w-100" href="./admin/admin-dashboard.html">
                    <i class="bi bi-shield-lock me-2"></i> Admin
                  </a>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
