<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit Complaint • Student • ASTU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/app.css" />
  </head>
  <body class="app-dash-body" data-page="student-submit">
    <div class="container-fluid app-shell">
      <div class="row g-0">
        <aside class="col-12 col-lg-2 app-sidebar" aria-label="Student sidebar">
          <div class="app-brand">
            <img src="../assets/img/astu-logo.png" alt="ASTU logo" style="width:28px;height:28px;object-fit:contain;border-radius:4px;" />
            <span>ASTU Student</span>
          </div>
          <nav class="app-nav d-grid gap-1" aria-label="Student navigation">
            <a href="./student-dashboard.html" data-nav="student-dashboard">
              <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
            </a>
            <a href="./submit-complaint.html" data-nav="student-submit">
              <i class="bi bi-plus-circle"></i> <span>Submit Complaint</span>
            </a>
            <a href="./my-complaints.html" data-nav="student-mine">
              <i class="bi bi-list-check"></i> <span>My Complaints</span>
            </a>
            <a href="./chatbot.html" data-nav="student-chatbot">
              <i class="bi bi-robot"></i> <span>Chatbot</span>
            </a>
            <a href="../index.html" class="mt-2">
              <i class="bi bi-house"></i> <span>Home</span>
            </a>
          </nav>
        </aside>

        <main class="col-12 col-lg-10">
          <header class="app-topbar">
            <div class="d-flex justify-content-between align-items-center">
              <h1 class="app-page-title">Submit Complaint</h1>
              <button class="btn btn-outline-danger btn-sm" type="button" data-action="logout">Logout</button>
            </div>
          </header>

          <div class="app-content">
            <div class="row justify-content-center">
              <div class="col-12 col-lg-9 col-xl-8">
                <div class="card app-card">
                  <div class="card-body p-4 p-md-5">
                    <form onsubmit="return false;">
                      <div class="row g-3">
                        <div class="col-12">
                          <label class="form-label" for="title">Title</label>
                          <input class="form-control" id="title" type="text" placeholder="Short issue title" required />
                        </div>
                        <div class="col-12">
                          <label class="form-label" for="desc">Description</label>
                          <textarea class="form-control" id="desc" rows="5" placeholder="Explain the problem clearly" required></textarea>
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label" for="category">Category</label>
                          <select class="form-select" id="category" required>
                            <option value="" selected disabled>Select category</option>
                            <option>Internet / Network</option>
                            <option>Classroom / Furniture</option>
                            <option>Lab / Computer</option>
                            <option>Electricity</option>
                            <option>Water</option>
                            <option>Other</option>
                          </select>
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label" for="priority">Priority</label>
                          <select class="form-select" id="priority">
                            <option>Low</option>
                            <option selected>Medium</option>
                            <option>High</option>
                          </select>
                        </div>
                        <div class="col-12">
                          <label class="form-label" for="file">Upload file (optional)</label>
                          <input class="form-control" id="file" type="file" />
                          <div class="form-text">Screenshots help staff resolve faster.</div>
                        </div>
                      </div>
                      <div class="d-flex gap-2 mt-4">
                        <button class="btn btn-primary" type="submit" data-action="submit">
                          <i class="bi bi-send me-1"></i> Submit
                        </button>
                        <a class="btn btn-app-outline" href="./student-dashboard.html">Cancel</a>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
