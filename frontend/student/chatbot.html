<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chatbot • Student • ASTU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/app.css" />
  </head>
  <body class="app-dash-body" data-page="student-chatbot">
    <div class="container-fluid app-shell">
      <div class="row g-0">
        <aside class="col-12 col-lg-2 app-sidebar" aria-label="Student sidebar">
          <div class="app-brand">
            <img src="../assets/img/astu-logo.png" alt="ASTU logo" style="width:28px;height:28px;object-fit:contain;border-radius:4px;" />
            <span>ASTU Student</span>
          </div>
          <nav class="app-nav d-grid gap-1" aria-label="Student navigation">
            <a href="./student-dashboard.html" data-nav="student-dashboard">
              <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
            </a>
            <a href="./submit-complaint.html" data-nav="student-submit">
              <i class="bi bi-plus-circle"></i> <span>Submit Complaint</span>
            </a>
            <a href="./my-complaints.html" data-nav="student-mine">
              <i class="bi bi-list-check"></i> <span>My Complaints</span>
            </a>
            <a href="./chatbot.html" data-nav="student-chatbot">
              <i class="bi bi-robot"></i> <span>Chatbot</span>
            </a>
            <a href="../index.html" class="mt-2">
              <i class="bi bi-house"></i> <span>Home</span>
            </a>
          </nav>
        </aside>

        <main class="col-12 col-lg-10">
          <header class="app-topbar">
            <div class="d-flex justify-content-between align-items-center">
              <h1 class="app-page-title">Chatbot</h1>
              <button class="btn btn-outline-danger btn-sm" type="button" data-action="logout">Logout</button>
            </div>
          </header>

          <div class="app-content">
            <div class="row justify-content-center">
              <div class="col-12 col-xl-9">
                <div class="card app-card">
                  <div class="app-card-header">
                    <div>
                      <div class="app-card-header__title">ASTU Help Bot</div>
                      <div class="app-card-header__subtitle">Ask how to submit complaints or describe your issue.</div>
                    </div>
                  </div>
                  <div class="p-3">
                    <div class="chat-wrap p-3" aria-label="Chat messages">
                      <div data-chat-list>
                        <div class="d-flex my-2">
                          <div class="chat-msg bot">Hi! Describe your problem and I'll guide you.</div>
                        </div>
                      </div>
                    </div>
                    <form class="mt-3" data-chat-form>
                      <div class="input-group">
                        <input class="form-control" placeholder="Type a message..." data-chat-input />
                        <button class="btn btn-primary" type="submit">
                          <i class="bi bi-send"></i>
                        </button>
                      </div>
                      <div class="form-text">Replies are simulated.</div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
