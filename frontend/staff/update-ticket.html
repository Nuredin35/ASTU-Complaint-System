<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Update Ticket • Staff • ASTU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/app.css" />
  </head>
  <body class="app-dash-body" data-page="staff-update">
    <div class="container-fluid app-shell">
      <div class="row g-0">
        <aside class="col-12 col-lg-2 app-sidebar" aria-label="Staff sidebar">
          <div class="app-brand">
            <i class="bi bi-people"></i>
            <span>ASTU Staff</span>
          </div>
          <nav class="app-nav d-grid gap-1" aria-label="Staff navigation">
            <a href="./staff-dashboard.html" data-nav="staff-dashboard">
              <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
            </a>
            <a href="./assigned-tickets.html" data-nav="staff-assigned">
              <i class="bi bi-inbox"></i> <span>Assigned Tickets</span>
            </a>
            <a href="./update-ticket.html" data-nav="staff-update">
              <i class="bi bi-pencil-square"></i> <span>Update Ticket</span>
            </a>
            <a href="../index.html" class="mt-2">
              <i class="bi bi-house"></i> <span>Home</span>
            </a>
          </nav>
        </aside>

        <main class="col-12 col-lg-10">
          <header class="app-topbar">
            <div class="d-flex justify-content-between align-items-center">
              <h1 class="app-page-title">Update Ticket</h1>
              <button class="btn btn-outline-danger btn-sm" type="button" data-action="logout">Logout</button>
            </div>
          </header>

          <div class="app-content">
            <div class="row justify-content-center">
              <div class="col-12 col-lg-8 col-xl-7">
                <div class="card app-card">
                  <div class="card-body p-4 p-md-5">
                    <h2 class="h5 mb-2 fw-bold" style="color: var(--app-primary-dark);">Ticket #T-210 • Internet not working (Dorm)</h2>
                    <p class="text-secondary small mb-4">This form does not save; it represents what staff will see.</p>

                    <form onsubmit="return false;">
                      <div class="mb-3">
                        <label class="form-label">Student</label>
                        <input class="form-control" value="Abebe K." disabled />
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input class="form-control" value="Internet / Network" disabled />
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Current Status</label>
                        <select class="form-select">
                          <option>Open</option>
                          <option selected>In Progress</option>
                          <option>Resolved</option>
                          <option>Closed</option>
                        </select>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Assign to (optional)</label>
                        <select class="form-select">
                          <option selected>ICT Technician 1</option>
                          <option>ICT Technician 2</option>
                          <option>Network Team</option>
                        </select>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Internal note</label>
                        <textarea class="form-control" rows="4" placeholder="Notes visible only to staff"></textarea>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Student-visible remark</label>
                        <textarea class="form-control" rows="3" placeholder="Short update the student will see"></textarea>
                      </div>

                      <div class="d-flex gap-2 mt-4">
                        <button class="btn btn-primary" type="submit" data-action="save">
                          <i class="bi bi-check2 me-1"></i> Save update
                        </button>
                        <a class="btn btn-app-outline" href="./assigned-tickets.html">Back to list</a>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
